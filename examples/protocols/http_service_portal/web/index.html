<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TuyaOpen Setup</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main class="card">
    <h1>TuyaOpen SoftAP Portal</h1>
    <p>Connect your device to router Wi-Fi.</p>
    <form id="wifi-form" method="post" action="/api/provision">
      <label>SSID<input id="ssid" name="ssid" maxlength="32" required></label>
      <label>Password<input id="password" name="password" maxlength="64" type="password"></label>
      <button type="submit">Connect</button>
    </form>
    <p><a href="/status.html">Go to status page</a></p>
  </main>
  <script src="/assets/app.js"></script>
</body>
</html>
